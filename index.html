<script>
const DEVANAGARI = {'सावित्री':'Savitri','देवी':'Devi','सुभाष':'Subhash','युगेश्वरी':'Yugeshwari','साहू':'Sahu','प्रेम':'Prem','शंकर':'Shankar','पाण्डेय':'Pandey','हेमलता':'Hemlata','सरल':'Saral','मुरली':'Murali','बर्षा':'Barsha','अनिका':'Anika','सिंह':'Singh','शिवानी':'Shivani','दीक्षित':'Dixit'};

function toEnglish(name) {
  let r = name;
  for(const [k,v] of Object.entries(DEVANAGARI)) r = r.replace(k,v);
  return r;
}

function displayName(name) {
  const n = toEnglish(name).trim();
  const words = n.split(/\s+/);
  const titles = /^(dr\.?|mr\.?|mrs\.?|ms\.?|bsc|mba|phd|prof\.?|ca|eng\.?|er\.?)$/i;
  let i = 0;
  // Skip titles/abbreviations at start
  while(i < words.length - 1 && titles.test(words[i])) i++;
  // If next word is a single-letter initial like "K.", keep it + following word
  if(i < words.length - 1 && /^[A-Za-z]\.$/.test(words[i])) {
    return words[i] + ' ' + words[i+1] + ' ji';
  }
  return words[i] + ' ji';
}

function renderPodium(top3) {
  const order = [top3[1], top3[0], top3[2]].filter(Boolean);
  const medals = ['🥈','🥇','🥉'];
  const cls = ['second','first','third'];
  document.getElementById('podium').innerHTML = order.map((p,i)=>`
    <div class="pod ${cls[i]}">
      <div class="pod-medal">${medals[i]}</div>
      <div class="pod-name">${displayName(p.name)}</div>
      <div class="pod-ref">${p.total} referrals</div>
      <a class="pod-link" href="${p.profile}" target="_blank">View profile</a>
    </div>`).join('');
}

function renderList(data) {
  let html = '';
  let shownSep = false;
  let rank = 3;
  let prevTotal = data[2] ? data[2].total : null;
  data.slice(3).forEach((p)=>{
    if(p.total !== prevTotal) { rank++; prevTotal = p.total; }
    if(!shownSep && p.total === 1) {
      html += `<div class="sep">— 1 referral —</div>`;
      shownSep = true;
    }
    html += `<div class="t-row" data-name="${displayName(p.name).toLowerCase()}">
      <div class="t-rank">${rank}</div>
      <div class="t-name">${displayName(p.name)}</div>
      <div style="text-align:center;">
        <div class="t-ref-num">${p.total}</div>
      </div>
      <div><a class="t-btn" href="${p.profile}" target="_blank">View profile</a></div>
    </div>`;
  });
  document.getElementById('list').innerHTML = html || '<div class="loading">No data.</div>';
}

function filterList() {
  const q = document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('.t-row').forEach(row => {
    row.style.display = row.dataset.name.includes(q) ? '' : 'none';
  });
}

function parseCSV(text) {
  const lines = text.trim().split('\n').filter(l=>l.trim());
  const sep = lines[0].includes('\t') ? '\t' : ',';
  const header = lines[0].toLowerCase().split(sep).map(h=>h.trim());
  const ni = header.findIndex(h=>h.includes('name'));
  const pi = header.findIndex(h=>h.includes('profile'));
  const ti = header.findIndex(h=>h.includes('total'));
  return lines.slice(1).map(l=>{
    const c = l.split(sep);
    return {name:(c[ni]||'').trim(), profile:(c[pi]||'').trim(), total:parseInt(c[ti])||0};
  }).filter(r=>r.name).sort((a,b)=>b.total-a.total);
}

  .then(r=>{ if(!r.ok) throw new Error(); return r.text(); })
  .then(text=>{ const d=parseCSV(text); renderPodium(d); renderList(d); })
  .catch(()=>{ renderPodium(FALLBACK); renderList(FALLBACK); });

function parseCSV(text) {
  const lines = text.trim().split('\n').filter(l=>l.trim());
  const sep = lines[0].includes('\t') ? '\t' : ',';
  const header = lines[0].toLowerCase().split(sep).map(h=>h.trim());
  const ni = header.findIndex(h=>h.includes('name'));
  const pi = header.findIndex(h=>h.includes('profile'));
  const ti = header.findIndex(h=>h.includes('total'));
  return lines.slice(1).map(l=>{
    const c = l.split(sep);
    return {name:(c[ni]||'').trim(), profile:(c[pi]||'').trim(), total:parseInt(c[ti])||0};
  }).filter(r=>r.name).sort((a,b)=>b.total-a.total);
}
